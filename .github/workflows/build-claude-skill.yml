name: Build Claude Skills

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build individual skill ZIPs
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "Building ZIP for $skill_name..."
            cd "$skill_dir"
            # We exclude the reference/ directory and all binary types
            zip -r "../../dist/${skill_name}-claude-${{ github.ref_name }}.zip" . \
              -x "*.git*" \
              -x "reference/*" \
              -x "*.pdf" \
              -x "*.png" \
              -x "*.jpg" \
              -x "*.xls" \
              -x "*.xlsx"
            cd ../..
          done

      - name: Build bundle ZIP
        run: |
          mkdir -p bundle-tmp/epost-masspost-bundle/epost-masspost-protocol
          mkdir -p bundle-tmp/epost-masspost-bundle/epost-masspost-tips
          mkdir -p bundle-tmp/epost-masspost-bundle/epost-browser-automation
          
          cp -r skills/epost-masspost-protocol/* bundle-tmp/epost-masspost-bundle/epost-masspost-protocol/
          cp -r skills/epost-masspost-tips/* bundle-tmp/epost-masspost-bundle/epost-masspost-tips/ || true
          cp -r skills/epost-browser-automation/* bundle-tmp/epost-masspost-bundle/epost-browser-automation/ || true
          
          # PRUNE: Remove reference directories and non-text files from the bundle
          rm -rf bundle-tmp/epost-masspost-bundle/*/reference
          find bundle-tmp/epost-masspost-bundle -type f \( -name "*.pdf" -o -name "*.png" -o -name "*.jpg" -o -name "*.xls" -o -name "*.xlsx" \) -delete
          
          # Remove individual SKILL.md files; the bundle has its own dispatcher
          rm -f bundle-tmp/epost-masspost-bundle/*/SKILL.md
          
          # Add bundle dispatcher
          cat <<EOF > bundle-tmp/epost-masspost-bundle/SKILL.md
---
name: bpost-ePost-MassPost bundle
description: Complete BPost e-MassPost suite including protocol specs, error codes, barcodes, transport, and tips. Use for anything e-MassPost related.
license: See LICENSE
---

# BPost e-MassPost — Complete Skills Suite

## Routing Guide

| When the question is about... | Read first |
|---|---|
| Protocol, files, error codes, barcodes, transport | \`epost-masspost-protocol/index.md\` |
| Best practices, do's & don'ts, common mistakes | \`epost-masspost-tips/index.md\` |
| Automating the e-MassPost web portal | \`epost-browser-automation/index.md\` |

Always start with the relevant index — it routes precisely to the right file.
EOF

          cd bundle-tmp
          zip -r "../dist/epost-masspost-bundle-claude-${{ github.ref_name }}.zip" epost-masspost-bundle/ -x "*.git*"
          cd ..

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
          generate_release_notes: true
