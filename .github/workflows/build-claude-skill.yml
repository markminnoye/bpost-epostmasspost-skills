name: Build Claude Skills

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Unified Skill ZIP
        run: |
          mkdir -p dist
          rm -rf staging && mkdir -p staging/epost-masspost
          
          # Copy only the protocol skill contents
          cp -r skills/epost-masspost-protocol/* staging/epost-masspost/
          
          # ZIP the staging area
          cd staging/epost-masspost
          zip -r "../../dist/epost-masspost-claude-${{ github.ref_name }}.zip" . -x "*.git*"
          cd ../..

      - name: Verify ZIP contents and sizes
        run: |
          ls -lh dist/
          echo "Listing contents of the skill ZIP to verify no bloat:"
          unzip -l "dist/epost-masspost-claude-${{ github.ref_name }}.zip" | head -n 30 || true

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
