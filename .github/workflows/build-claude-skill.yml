name: Build Claude Skills

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build individual skill ZIPs
        run: |
          mkdir -p dist
          rm -rf staging && mkdir staging
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            echo "Staging $skill_name..."
            mkdir -p "staging/${skill_name}"
            # Copy explicitly from the folder into our clean-room staging area
            cp -r "$skill_dir"* "staging/${skill_name}/"
            
            # ZIP the staging area (SKILL.md is at its root)
            cd "staging/${skill_name}"
            zip -r "../../dist/${skill_name}-claude-${{ github.ref_name }}.zip" . -x "*.git*"
            cd ../..
          done

      - name: Build bundle ZIP
        run: |
          rm -rf bundle-staging && mkdir -p bundle-staging/epost-masspost-bundle
          
          # Only copy the three specific skill folders - guarantees no root-level reference PDFs
          mkdir -p bundle-staging/epost-masspost-bundle/epost-masspost-protocol
          mkdir -p bundle-staging/epost-masspost-bundle/epost-masspost-tips
          mkdir -p bundle-staging/epost-masspost-bundle/epost-browser-automation
          
          cp -r skills/epost-masspost-protocol/* bundle-staging/epost-masspost-bundle/epost-masspost-protocol/
          cp -r skills/epost-masspost-tips/* bundle-staging/epost-masspost-bundle/epost-masspost-tips/ || true
          cp -r skills/epost-browser-automation/* bundle-staging/epost-masspost-bundle/epost-browser-automation/ || true
          
          # Remove individual SKILL.md files to prioritize the bundle-level one
          rm -f bundle-staging/epost-masspost-bundle/*/SKILL.md
          
          # Add the bundle-level Skill definition
          cat <<EOF > bundle-staging/epost-masspost-bundle/SKILL.md
---
name: bpost-ePost-MassPost bundle
description: Complete BPost e-MassPost suite including protocol specs, error codes, barcodes, transport, and tips. Use for anything e-MassPost related.
license: See LICENSE
---

# BPost e-MassPost — Complete Skills Suite

## Routing Guide

| When the question is about... | Read first |
|---|---|
| Protocol, files, error codes, barcodes, transport | \`epost-masspost-protocol/index.md\` |
| Best practices, do's & don'ts, common mistakes | \`epost-masspost-tips/index.md\` |
| Automating the e-MassPost web portal | \`epost-browser-automation/index.md\` |

Always start with the relevant index — it routes precisely to the right file.
EOF

          cd bundle-staging
          zip -r "../dist/epost-masspost-bundle-claude-${{ github.ref_name }}.zip" epost-masspost-bundle/ -x "*.git*"
          cd ..

      - name: Verify ZIP contents and sizes
        run: |
          ls -lh dist/
          echo "Listing contents of the bundle ZIP to verify no bloat:"
          unzip -l "dist/epost-masspost-bundle-claude-${{ github.ref_name }}.zip" | head -n 30 || true

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.zip
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
